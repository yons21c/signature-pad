<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서명 패드</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #f4f4f9; }
        .box { background: white; border: 1px solid #ddd; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        canvas { border: 1px solid #ccc; background: white; width: 100%; height: 200px; border-radius: 8px; touch-action: none; }
        .button-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; background: #007bff; color: white; }
        button.clear { background: #6c757d; }
    </style>
</head>
<body>

    <div class="box">
        <h3>서명 패드</h3>
        <canvas id="signature-pad"></canvas>
        <div class="button-group">
            <button class="clear" onclick="clearSignature()">지우기</button>
            <button onclick="saveSignature()">서명 저장(PNG)</button>
        </div>
    </div>

    <!-- Signature Pad 라이브러리 (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script>
        const canvas = document.getElementById('signature-pad');
        const signaturePad = new SignaturePad(canvas);

        function clearSignature() {
            signaturePad.clear();
        }

        function saveSignature() {
            if (signaturePad.isEmpty()) {
                alert("서명을 먼저 입력해주세요.");
                return;
            }
            
            // 데이터 이미지로 변환 및 다운로드
            const dataURL = signaturePad.toDataURL("image/png");
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = 'my_signature.png';
            link.click();
        }
        
        // 윈도우 리사이즈 시 캔버스 크기 대응
        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
